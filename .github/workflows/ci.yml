name: ci for code quality

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: install dependencies
        run: pip install uv && uv sync --group dev
      - name: run ruff
        run: uv run ruff check .
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: install dependencies
        run: pip install uv && uv sync --group dev
      - name: run tests
        run: uv run pytest || [ $? -eq 5 ]
  type-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps: 
      - name: checkout code
        uses: actions/checkout@v4
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: install dependencies
        run: pip install uv && uv sync --group dev
      - name: run mypy
        run: uv run mypy src/
